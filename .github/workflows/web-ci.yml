name: web-ci
on:
  push:
    paths: ["web/**"]
  pull_request:
    paths: ["web/**"]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build   # tsc -b && vite build — type errors fail the check
